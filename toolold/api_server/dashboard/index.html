<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Monitor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card.active .value { color: #10b981; }
        .stat-card.warning .value { color: #f59e0b; }
        .stat-card.danger .value { color: #ef4444; }
        
        .accounts-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .table-header {
            padding: 15px 20px;
            background: #667eea;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f9fafb;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-active {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-logged-out {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-login-failed {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .last-update {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Gmail Account Monitor</h1>
            <p>Theo dõi tình trạng tài khoản Gmail của bạn từ xa</p>
            <button class="refresh-btn" onclick="loadData()">🔄 Làm mới</button>
            <div class="last-update" id="lastUpdate">Chưa tải dữ liệu</div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <h3>Tổng số tài khoản</h3>
                <div class="value" id="total">-</div>
            </div>
            <div class="stat-card active">
                <h3>Đang hoạt động</h3>
                <div class="value" id="active">-</div>
            </div>
            <div class="stat-card warning">
                <h3>Bị đăng xuất</h3>
                <div class="value" id="loggedOut">-</div>
            </div>
            <div class="stat-card danger">
                <h3>Lỗi</h3>
                <div class="value" id="errors">-</div>
            </div>
        </div>
        
        <div class="accounts-table">
            <div class="table-header">
                <h2>Danh sách tài khoản</h2>
                <span id="accountCount">0 tài khoản</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Trạng thái</th>
                        <th>Lần kiểm tra cuối</th>
                        <th>Đăng nhập cuối</th>
                        <th>Chăm sóc cuối</th>
                    </tr>
                </thead>
                <tbody id="accountsTable">
                    <tr>
                        <td colspan="5" class="loading">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // Thay đổi URL này thành URL Vercel của bạn sau khi deploy
        const API_URL = window.location.origin + '/api' || 'https://your-app.vercel.app/api';
        
        async function loadData() {
            try {
                // Load stats
                const statsRes = await fetch(`${API_URL}/index?endpoint=stats`);
                const statsData = await statsRes.json();
                
                if (statsData.success) {
                    updateStats(statsData.stats);
                }
                
                // Load accounts
                const accountsRes = await fetch(`${API_URL}/index?endpoint=accounts`);
                const accountsData = await accountsRes.json();
                
                if (accountsData.success) {
                    updateAccounts(accountsData.accounts);
                    document.getElementById('accountCount').textContent = `${accountsData.count} tài khoản`;
                }
                
                // Update last update time
                document.getElementById('lastUpdate').textContent = 
                    `Cập nhật lần cuối: ${new Date().toLocaleString('vi-VN')}`;
                    
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('accountsTable').innerHTML = 
                    '<tr><td colspan="5" style="text-align:center;color:red;">Lỗi tải dữ liệu. Kiểm tra API URL.</td></tr>';
            }
        }
        
        function updateStats(stats) {
            document.getElementById('total').textContent = stats.total || 0;
            document.getElementById('active').textContent = stats.active || 0;
            document.getElementById('loggedOut').textContent = stats.loggedOut || 0;
            document.getElementById('errors').textContent = 
                (stats.errors || 0) + (stats.loginFailed || 0) + (stats.wrongAccount || 0);
        }
        
        function updateAccounts(accounts) {
            const tbody = document.getElementById('accountsTable');
            
            if (!accounts || accounts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Chưa có tài khoản nào</td></tr>';
                return;
            }
            
            tbody.innerHTML = accounts.map(acc => `
                <tr>
                    <td>${acc.email || '-'}</td>
                    <td>
                        <span class="status-badge status-${getStatusClass(acc.status)}">
                            ${getStatusText(acc.status)}
                        </span>
                    </td>
                    <td>${formatDate(acc.lastCheck)}</td>
                    <td>${formatDate(acc.lastLogin)}</td>
                    <td>${formatDate(acc.lastCare)}</td>
                </tr>
            `).join('');
        }
        
        function getStatusClass(status) {
            if (status === 'active') return 'active';
            if (status === 'logged_out') return 'logged-out';
            if (status === 'login_failed') return 'login-failed';
            return 'error';
        }
        
        function getStatusText(status) {
            const statusMap = {
                'active': 'Hoạt động',
                'logged_out': 'Đã đăng xuất',
                'login_failed': 'Lỗi đăng nhập',
                'wrong_account': 'Sai tài khoản',
                'error': 'Lỗi',
                'unknown': 'Chưa xác định'
            };
            return statusMap[status] || status;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'Chưa có';
            try {
                const date = new Date(dateStr);
                return date.toLocaleString('vi-VN');
            } catch {
                return dateStr;
            }
        }
        
        // Auto refresh mỗi 30 giây
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
